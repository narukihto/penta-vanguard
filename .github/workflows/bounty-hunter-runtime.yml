name: Penta-V Vanguard Sovereign CI/CD Pipeline

on:
  workflow_dispatch:
    inputs:
      issue_content:
        description: 'Complete Massive Issue & Repository Context Payload'
        required: true
        type: string

permissions:
  contents: write
  pages: write
  id-token: write
  actions: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  purify_and_resolve:
    environment: github-pages
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Sovereign Repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.VANGUARD_GITHUB_TOKEN }}

      - name: Setup Pinned Enterprise Python Environment
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Verified 2026 Dependencies
        run: |
          set -x  # تفعيل التتبع لطباعة كل أمر قبل تنفيذه
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install penta-v-kernel==0.4.3
          python -c "import penta_v_kernel; print(f'DEBUG: Location: {penta_v_kernel.__file__}')"
          echo "PYTHONPATH=$PYTHONPATH:$(python -c 'import site; print(site.getsitepackages()[0])')" >> $GITHUB_ENV

      - name: Execute Vanguard Autopilot Engine
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
        run: |
          set -x  # تتبع تنفيذ المحرك
          python -v agent_subsystem/autopilot.py --issue_content "${{ github.event.inputs.issue_content }}" 2>&1

      - name: Commit Structural State Hydration
        if: always() # تنفيذ حتى لو فشل المحرك لنرى الـ state
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action Artifact Bot"
          # ... (باقي كود الـ commit)
