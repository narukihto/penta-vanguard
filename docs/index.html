<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Penta-V Vanguard | Sovereign Bounty Hunter</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="min-h-screen flex flex-col font-sans antialiased bg-slate-950 text-slate-100">

    <header class="border-b border-slate-800 bg-slate-900/50 backdrop-blur px-6 py-4 flex justify-between items-center">
        <div class="flex items-center space-x-3 space-x-reverse">
            <span class="text-2xl">🛡️</span>
            <div>
                <h1 class="text-xl font-bold tracking-wide text-slate-100">Penta-V Vanguard</h1>
                <p class="text-xs text-slate-400">Sovereign Context Isolation & Logic Purification Substrate</p>
            </div>
        </div>
        <div class="flex items-center space-x-2 space-x-reverse">
            <span id="systemPulse" class="w-3 h-3 rounded-full bg-emerald-500 animate-pulse"></span>
            <span id="systemStatus" class="text-xs font-mono uppercase tracking-wider text-emerald-400 font-bold">System: Sovereign</span>
        </div>
    </header>

    <main class="flex-1 grid grid-cols-1 xl:grid-cols-3 gap-4 p-4 h-[calc(100vh-140px)]">
        
        <section class="flex flex-col bg-slate-900/40 border border-slate-800 rounded-xl p-4 space-y-3">
            <h2 class="text-xs font-semibold uppercase text-slate-300">📂 Issue Context</h2>
            <textarea id="issuePayload" class="flex-1 w-full bg-slate-950 text-slate-200 font-mono text-xs border border-slate-800 rounded-lg p-3 resize-none focus:outline-none" placeholder="Paste issue details here..."></textarea>
            <button onclick="triggerVanguardWorkflow()" class="w-full bg-sky-600 hover:bg-sky-500 py-2.5 rounded-lg text-sm font-bold">Initiate Resolution</button>
        </section>

        <section class="flex flex-col bg-slate-900/40 border border-slate-800 rounded-xl p-4 space-y-3">
            <div class="flex justify-between items-center">
                <h2 class="text-xs font-semibold uppercase text-slate-300">💻 Circuit Implementation</h2>
                <button onclick="copyCertifiedCode('certifiedOutput')" class="text-[10px] bg-slate-800 px-2 py-1 rounded">📋 Copy</button>
            </div>
            <div id="certifiedOutput" class="flex-1 w-full bg-slate-950 border border-slate-800 rounded-lg p-3 font-mono text-[11px] text-sky-400 overflow-auto whitespace-pre">Waiting for implementation...</div>
        </section>

        <section class="flex flex-col bg-slate-900/40 border border-slate-800 rounded-xl p-4 space-y-3">
            <div class="flex justify-between items-center">
                <h2 class="text-xs font-semibold uppercase text-emerald-400">🧪 Integration Tests</h2>
                <button onclick="copyCertifiedCode('certifiedTests')" class="text-[10px] bg-slate-800 px-2 py-1 rounded">📋 Copy</button>
            </div>
            <div id="certifiedTests" class="flex-1 w-full bg-slate-950 border border-emerald-900/30 rounded-lg p-3 font-mono text-[11px] text-emerald-300 overflow-auto whitespace-pre">Waiting for tests...</div>
        </section>
    </main>

    <footer class="border-t border-slate-800 bg-slate-950 px-6 py-2 flex justify-between text-[10px] font-mono text-slate-500">
        <div>Entropy: <span id="entropyValue">0.00</span></div>
        <div>Penta-V Core: v0.4.3 (Tri-Axis Active)</div>
    </footer>

    <script src="app.js"></script>
</body>
</html>
